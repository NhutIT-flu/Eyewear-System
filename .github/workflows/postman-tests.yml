name: Eyewear System API Test Automation Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eyewear_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo, pdo_mysql, mbstring, openssl

    - name: Create .env file for CI
      run: |
        echo 'APP_NAME=Eyewear Backend' > backend/.env
        echo 'APP_ENV=testing' >> backend/.env
        echo 'APP_URL=http://127.0.0.1:8000' >> backend/.env
        echo 'APP_DEBUG=true' >> backend/.env
        echo 'API_PREFIX=/api' >> backend/.env
        echo 'JWT_SECRET=ci-test-secret-key-for-github-actions' >> backend/.env
        echo 'JWT_EXPIRE=1440' >> backend/.env
        echo 'DB_CONNECTION=mysql' >> backend/.env
        echo 'DB_HOST=127.0.0.1' >> backend/.env
        echo 'DB_PORT=3306' >> backend/.env
        echo 'DB_DATABASE=eyewear_system' >> backend/.env
        echo 'DB_USERNAME=root' >> backend/.env
        echo 'DB_PASSWORD=root' >> backend/.env

    - name: Import database schema and run seeder
      run: |
        if [ ! -f backend/database/schema.sql ]; then
          echo "❌ schema.sql not found! Aborting to prevent cascade test failures."
          exit 1
        fi
        mysql -h 127.0.0.1 -u root -proot eyewear_system < backend/database/schema.sql
        echo "✅ Database schema imported successfully."
        
        # Run seeder to populate test data (users, products, etc.)
        php backend/database/seeder.php
        echo "✅ Database seeded successfully."


    - name: Start PHP backend server
      run: |
        php -S 127.0.0.1:8000 -t backend/public backend/public/index.php > /tmp/php-server.log 2>&1 &
        echo "⏳ Waiting for server to be ready..."
        MAX_RETRIES=15
        RETRY_COUNT=0
        SERVER_READY=false
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/health 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Server is responding (HTTP $HTTP_CODE)."
            SERVER_READY=true
            break
          fi
          RETRY_COUNT=$((RETRY_COUNT + 1))
          echo "   Attempt $RETRY_COUNT/$MAX_RETRIES — waiting 2s..."
          sleep 2
        done
        if [ "$SERVER_READY" != "true" ]; then
          echo "❌ Server failed to start after $MAX_RETRIES attempts. PHP log:"
          cat /tmp/php-server.log
          exit 1
        fi

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    - name: Run Eyewear API Tests
      timeout-minutes: 10
      run: |
        newman run "Eyewear-System.postman_collection.json" \
          -e "Eyewear-Local-Environment.postman_environment.json" \
          --env-var "baseUrl=http://127.0.0.1:8000/api/v1" \
          --timeout-request 10000 \
          --timeout 120000 \
          -r cli,htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-eyewear.html \
          --reporter-json-export ./postman-reports/summary-eyewear.json \
          --suppress-exit-code

    # ==========================================================
    # JIRA SMART BUG MANAGEMENT
    # - API fail  → tạo bug mới hoặc comment vào bug cũ
    # - API pass  → tự động đóng bug tương ứng trên Jira
    # - Transition ID "Done" được query động, không hardcode
    # ==========================================================
    - name: Sync Jira Bugs With Test Results
      if: always()
      env:
        JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_GMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_APIKEY }}
        PROJECT_KEY: 'ESQ'
        ACTOR: ${{ github.actor }}
        BRANCH: ${{ github.ref_name }}
        RUN_ID: ${{ github.run_id }}
        RUN_NUMBER: ${{ github.run_number }}
        REPOSITORY: ${{ github.repository }}
      run: |
        node <<'NODE'
        const fs = require("fs");
        const { execSync } = require("child_process");

        const reportFiles = [
          { name: "Eyewear API", file: "./postman-reports/summary-eyewear.json" }
        ];

        const requiredEnv = ["JIRA_BASE_URL", "JIRA_USER_EMAIL", "JIRA_API_TOKEN", "PROJECT_KEY"];
        for (const key of requiredEnv) {
          if (!process.env[key]) {
            console.log(`⚠️ Missing env ${key}. Skip Jira sync.`);
            process.exit(0);
          }
        }

        const auth = Buffer
          .from(`${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`)
          .toString("base64");
        const jiraBase = process.env.JIRA_BASE_URL.replace(/\/$/, "");

        const members = [
          "712020:ba3687e1-2a5e-4f18-8594-07315b414728",
          "712020:b2b9ed8a-a72a-43ae-8a12-1c5c7e599e08",
          "712020:0ad5e210-883e-4449-8daa-2d3b51029e4d",
          "712020:d335bfed-2162-4164-9e7f-172d5434d5b0",
          "712020:83ddbb5b-a878-423a-8972-12137f84b4f3",
          "712020:9645f74c-0db2-4301-a77a-f0f57c6244fd"
        ];

        // ── Helpers ───────────────────────────────────────────────────────
        function curlJson(method, url, body = null) {
          const cmd =
            `curl -s -X ${method} ` +
            `-H "Authorization: Basic ${auth}" ` +
            `-H "Content-Type: application/json" ` +
            `${body ? "-d @-" : ""} "${url}"`;
          const output = execSync(cmd, {
            input: body ? JSON.stringify(body) : undefined,
            encoding: "utf8",
            maxBuffer: 1024 * 1024 * 20
          });
          if (!output || output.trim() === "") return {};
          try { return JSON.parse(output); }
          catch { console.log("⚠️ Jira not JSON:", output.slice(0, 300)); return {}; }
        }

        const normalize = v => String(v || "").replace(/[\r\n\t]+/g, " ").replace(/\s+/g, " ").trim();
        const slugify   = v => normalize(v).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 60);
        const adf       = lines => ({
          version: 1, type: "doc",
          content: lines.map(t => ({ type: "paragraph", content: [{ type: "text", text: String(t) }] }))
        });

        // ── Dynamic "Done" transition ID ─────────────────────────────────
        let DONE_TRANSITION_ID = null;
        function getDoneTransitionId(issueKey) {
          if (DONE_TRANSITION_ID) return DONE_TRANSITION_ID;
          const res = curlJson("GET", `${jiraBase}/rest/api/3/issue/${issueKey}/transitions`);
          const done = (res.transitions || []).find(t =>
            ["done", "closed", "resolved"].includes(normalize(t.name).toLowerCase())
          );
          if (done) { DONE_TRANSITION_ID = done.id; return done.id; }
          console.log("⚠️ No Done transition found. Available:", (res.transitions || []).map(t => t.name).join(", "));
          return null;
        }

        // ── Parse Newman report ───────────────────────────────────────────
        const failedApis   = new Set();
        const passedApis   = new Set();
        const failuresMap  = new Map();

        for (const item of reportFiles) {
          if (!fs.existsSync(item.file)) {
            console.log(`⚠️ Report not found: ${item.file}`);
            continue;
          }
          const data = JSON.parse(fs.readFileSync(item.file, "utf8"));

          for (const fail of (data?.run?.failures || [])) {
            const apiName  = normalize(fail?.source?.name || "Unknown API");
            const errorMsg = normalize(fail?.error?.message || "Assertion failed");
            const key      = `${item.name}|||${apiName}`;
            
            failedApis.add(apiName);
            
            if (!failuresMap.has(key)) {
              failuresMap.set(key, {
                moduleName: item.name,
                apiName,
                errorMsgs: [errorMsg],
                bugKey: slugify(`${item.name}-${apiName}`),
                summary: `❌ [CI/CD] Lỗi API: ${apiName} (${item.name})`
              });
            } else {
              failuresMap.get(key).errorMsgs.push(errorMsg);
            }
          }

          for (const exec of (data?.run?.executions || [])) {
            const apiName = normalize(exec?.item?.name || "");
            if (apiName && !failedApis.has(apiName)) passedApis.add(`${item.name}|||${apiName}`);
            
            const key = `${item.name}|||${apiName}`;
            if (apiName && failuresMap.has(key)) {
              const failObj = failuresMap.get(key);
              if (!failObj.details) {
                let reqBody = exec?.request?.body?.raw ? "\\nPayload:\\n" + exec.request.body.raw.replace(/\\n/g, "\\n") : "";
                if (reqBody.length > 500) reqBody = reqBody.substring(0, 500) + "... (truncated)";
                failObj.details = `Method: ${exec?.request?.method || "UNKNOWN"}\\nURL: ${exec?.request?.url?.raw || "UNKNOWN URL"}${reqBody}\\nResponse Code: ${exec?.response?.code || "UNKNOWN"}`;
              }
            }
          }
        }
        
        const failures = Array.from(failuresMap.values()).map(f => {
          // Remove duplicate error messages inside the array
          f.errorMsg = [...new Set(f.errorMsgs)].join("\\n- ");
          return f;
        });

        const runUrl = `https://github.com/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`;

        // ── Load open CI/CD bugs from Jira (for auto-close logic) ──────────
        function getOpenCiBugs() {
          const jql = `project = ${process.env.PROJECT_KEY} AND statusCategory != Done`;
          const url = `${jiraBase}/rest/api/3/search/jql?jql=${encodeURIComponent(jql)}&maxResults=1000&fields=summary,status,labels,issuetype,assignee`;
          const res = curlJson("GET", url);
          if (res.errorMessages || res.errors) {
            console.log("❌ Jira search error:", JSON.stringify(res).slice(0, 500));
            return [];
          }
          return (res.issues || []).filter(i => {
            const summary = normalize(i?.fields?.summary || "");
            const type    = normalize(i?.fields?.issuetype?.name || "").toLowerCase();
            return type === "bug" && (
              summary.includes("[CI/CD]") ||
              summary.includes("Lỗi API:")  ||
              summary.includes("Loi API:")
            );
          });
        }

        // ── Load ALL CI/CD bugs from Jira (for deduplication — includes Done) ──
        function getAllCiBugs() {
          const jql = `project = ${process.env.PROJECT_KEY} AND issuetype = Bug AND labels = "ci-cd" ORDER BY created DESC`;
          const url = `${jiraBase}/rest/api/3/search/jql?jql=${encodeURIComponent(jql)}&maxResults=1000&fields=summary,status,labels,issuetype,assignee`;
          const res = curlJson("GET", url);
          if (res.errorMessages || res.errors) {
            console.log("⚠️ Jira all-bugs search error:", JSON.stringify(res).slice(0, 300));
            return [];
          }
          return (res.issues || []).filter(i => {
            const summary = normalize(i?.fields?.summary || "");
            const type    = normalize(i?.fields?.issuetype?.name || "").toLowerCase();
            return type === "bug" && (
              summary.includes("[CI/CD]") ||
              summary.includes("Lỗi API:")  ||
              summary.includes("Loi API:")
            );
          });
        }

        const openCiBugs = getOpenCiBugs();
        const allCiBugs  = getAllCiBugs();  // includes Done — used for dedup
        console.log(`🔎 Found ${openCiBugs.length} open CI/CD bugs in Jira (${allCiBugs.length} total including closed).`);

        function findExistingBug(bug) {
          // Search ALL bugs (including Done) to prevent duplicates when a fixed bug re-fails
          return allCiBugs.find(i => {
            const summary = normalize(i?.fields?.summary || "");
            const labels  = i?.fields?.labels || [];
            return labels.includes(`api-${bug.bugKey}`)
              || summary === normalize(bug.summary)
              || (summary.includes("[CI/CD]") && summary.includes(bug.apiName) && summary.includes(bug.moduleName));
          }) || null;
        }

        // ── Helper: tìm comment CI/CD cũ (theo sentinel marker) ──────────
        const COMMENT_MARKER = "🤖 [CI/CD-AUTO-COMMENT]";

        function findCiComment(issueKey) {
          const res = curlJson("GET", `${jiraBase}/rest/api/3/issue/${issueKey}/comment?maxResults=100&orderBy=created`);
          const comments = res.comments || [];
          // Tìm comment có chứa marker, lấy comment đầu tiên (cũ nhất)
          return comments.find(c => {
            const bodyText = JSON.stringify(c.body || "");
            return bodyText.includes(COMMENT_MARKER);
          }) || null;
        }

        function upsertComment(issueKey, lines) {
          const body = adf([COMMENT_MARKER, ...lines]);
          const existing = findCiComment(issueKey);
          if (existing) {
            curlJson("PUT", `${jiraBase}/rest/api/3/issue/${issueKey}/comment/${existing.id}`, { body });
            return "updated";
          } else {
            curlJson("POST", `${jiraBase}/rest/api/3/issue/${issueKey}/comment`, { body });
            return "created";
          }
        }

        // ── Auto-close bugs whose API now passes ──────────────────────────
        let closedCount = 0;
        for (const issue of openCiBugs) {
          const summary = normalize(issue?.fields?.summary || "");
          const labels  = issue?.fields?.labels || [];
          let matched   = false;

          for (const passedKey of passedApis) {
            const [modName, apiName] = passedKey.split("|||");
            const bk = slugify(`${modName}-${apiName}`);
            if (labels.includes(`api-${bk}`) || (summary.includes("[CI/CD]") && summary.includes(apiName) && summary.includes(modName))) {
              matched = true;
              break;
            }
          }

          if (!matched) continue;

          const transId = getDoneTransitionId(issue.key);
          if (!transId) { console.log(`⚠️ Skip auto-close ${issue.key} — transition not found.`); continue; }

          curlJson("POST", `${jiraBase}/rest/api/3/issue/${issue.key}/transitions`, { transition: { id: transId } });
          const action = upsertComment(issue.key, [
            "✅ CI/CD xác nhận API đã PASS. Bug được tự động đóng.",
            `Branch: ${process.env.BRANCH}`,
            `Người chạy: ${process.env.ACTOR}`,
            `GitHub Actions Run #${process.env.RUN_NUMBER}: ${runUrl}`
          ]);
          console.log(`✅ Auto-closed ${issue.key} — API đã pass. (comment ${action})`);
          closedCount++;
        }

        // Cache git branches ONCE to avoid network timeout/rate-limiting in the loop
        let cachedBranches = "";
        try {
          cachedBranches = execSync("git ls-remote --heads origin", { encoding: "utf8" });
        } catch (e) { }

        for (const [index, bug] of failures.entries()) {
          const existing = findExistingBug(bug);

          if (existing) {
            // Reopen if bug was already marked as Done
            const statusName = (existing?.fields?.status?.statusCategory?.name || "").toLowerCase();
            const statusKey = (existing?.fields?.status?.statusCategory?.key || "").toLowerCase();
            
            const hasBranch = (issueKey) => cachedBranches.includes(issueKey);
            
            const isWorking = hasBranch(existing.key);
            const isDone = (statusName === "done" || statusKey === "done");
            const isInProgress = (statusName.includes("in progress") || statusName.includes("đang") || statusName.includes("tiến hành"));
            
            // We want it to be In Progress if it has a branch, To Do if it doesn't.
            const needsTransition = isDone || (isWorking && !isInProgress) || (!isWorking && isInProgress);

            if (needsTransition) {
              const attemptTransition = (issueKey, targetList) => {
                const res = curlJson("GET", `${jiraBase}/rest/api/3/issue/${issueKey}/transitions`);
                const trans = res.transitions || [];
                let found = null;
                for (const name of targetList) {
                  found = trans.find(t => normalize(t.name).toLowerCase().includes(name));
                  if (found) break;
                }
                if (found) {
                  curlJson("POST", `${jiraBase}/rest/api/3/issue/${issueKey}/transitions`, { transition: { id: found.id } });
                  return found;
                }
                return null;
              };

              let firstTries = isWorking 
                ? ["in progress", "start", "đang", "tiến hành", "reopen", "open", "to do", "backlog"]
                : ["to do", "backlog", "open"]; // Do not fallback to in progress if not working!
              
              const firstTrans = attemptTransition(existing.key, firstTries) || attemptTransition(existing.key, [""]); // fallback to any
              if (firstTrans) console.log(`🔄 Moved ${existing.key} to (Transition: ${firstTrans.name})`);

              // Double check if we need a second hop to In Progress
              if (isWorking) {
                 const hopTrans = attemptTransition(existing.key, ["in progress", "start", "đang", "tiến hành"]);
                 if (hopTrans) console.log(`🚀 Double-hopped ${existing.key} to (Transition: ${hopTrans.name})`);
              }
            }

            // UPDATE BUG DESCRIPTION to reflect current error
            curlJson("PUT", `${jiraBase}/rest/api/3/issue/${existing.key}`, {
              fields: {
                description: adf([
                  "Hệ thống kiểm thử tự động phát hiện API bị lỗi (Bug tái diễn).",
                  `Bộ kịch bản: ${bug.moduleName}`,
                  `Tên API: ${bug.apiName}`,
                  `Thông tin Request/Response:\\n${bug.details || "Không có"}`,
                  `Chi tiết các lỗi hiện tại:\\n- ${bug.errorMsg}`,
                  "---",
                  `Người kích hoạt build: ${process.env.ACTOR}`,
                  `Nhánh code: ${process.env.BRANCH}`,
                  `GitHub Actions Run #${process.env.RUN_NUMBER}: ${runUrl}`,
                  "Báo cáo HTML: tải trong mục Artifacts trên GitHub Actions."
                ])
              }
            });

            const action = upsertComment(existing.key, [
              "⚠️ CI/CD vẫn phát hiện lỗi này trong lần chạy mới (Bug tái diễn - Reopened).",
              `API: ${bug.apiName}`,
              `Bộ test: ${bug.moduleName}`,
              `Lỗi: ${bug.errorMsg}`,
              `Người chạy: ${process.env.ACTOR}`,
              `Branch: ${process.env.BRANCH}`,
              `GitHub Actions Run #${process.env.RUN_NUMBER}: ${runUrl}`
            ]);
            console.log(`💬 ${action === "updated" ? "Updated" : "Added"} CI/CD comment on (${existing.key}) — [${bug.apiName}] still failing.`);
            commentedCount++;
          } else {
            const jiraData = {
              fields: {
                project: { key: process.env.PROJECT_KEY },
                summary: bug.summary,
                description: adf([
                  "Hệ thống kiểm thử tự động phát hiện API bị lỗi.",
                  `Bộ kịch bản: ${bug.moduleName}`,
                  `Tên API: ${bug.apiName}`,
                  `Thông tin Request/Response:\\n${bug.details || "Không có"}`,
                  `Chi tiết các lỗi:\\n- ${bug.errorMsg}`,
                  "---",
                  `Người kích hoạt build: ${process.env.ACTOR}`,
                  `Nhánh code: ${process.env.BRANCH}`,
                  `GitHub Actions Run #${process.env.RUN_NUMBER}: ${runUrl}`,
                  "Báo cáo HTML: tải trong mục Artifacts trên GitHub Actions."
                ]),
                issuetype: { name: "Bug" },
                priority:  { name: "High" },
                labels: ["ci-cd", "postman", "auto-detected", `api-${bug.bugKey}`],
                assignee:  { accountId: members[index % members.length] }
              }
            };
            const res = curlJson("POST", `${jiraBase}/rest/api/3/issue`, jiraData);
            if (res.key) { console.log(`✅ Created bug [${bug.apiName}] → ${res.key}`); createdCount++; }
            else { console.log(`❌ Failed to create bug [${bug.apiName}]:`, JSON.stringify(res).slice(0, 500)); }
          }
        }

        if (failures.length === 0) {
          console.log("✅ All APIs passed — no new bugs needed.");
        }

        console.log(`\n📌 Jira sync done. Created: ${createdCount} | Commented: ${commentedCount} | Auto-closed: ${closedCount}`);
        
        if (failures.length > 0) {
          console.log("\n❌ Failing the pipeline because there are API errors.");
          process.exit(1);
        }
        NODE

    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/
