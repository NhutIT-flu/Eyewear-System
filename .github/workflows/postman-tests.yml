name: Postman API Tests & Jira Update

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
  JIRA_EMAIL: ${{ secrets.JIRA_GMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_APIKEY }}

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eyewear_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, openssl

      # 3. Install Node.js (for Newman)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install Newman (Postman CLI runner)
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      # 5. Create backend .env for CI
      - name: Create .env file
        run: |
          echo 'APP_NAME=Eyewear Backend' > backend/.env
          echo 'APP_ENV=testing' >> backend/.env
          echo 'APP_URL=http://127.0.0.1:8000' >> backend/.env
          echo 'APP_DEBUG=true' >> backend/.env
          echo 'API_PREFIX=/api' >> backend/.env
          echo 'JWT_SECRET=ci-test-secret-key-for-github-actions' >> backend/.env
          echo 'JWT_EXPIRE=1440' >> backend/.env
          echo 'DB_CONNECTION=mysql' >> backend/.env
          echo 'DB_HOST=127.0.0.1' >> backend/.env
          echo 'DB_PORT=3306' >> backend/.env
          echo 'DB_DATABASE=eyewear_system' >> backend/.env
          echo 'DB_USERNAME=root' >> backend/.env
          echo 'DB_PASSWORD=root' >> backend/.env
          echo 'CORS_ALLOWED_ORIGIN=http://127.0.0.1:5500' >> backend/.env
          echo 'MAIL_MAILER=smtp' >> backend/.env
          echo 'MAIL_HOST=127.0.0.1' >> backend/.env
          echo 'MAIL_PORT=1025' >> backend/.env
          echo 'MAIL_USERNAME=' >> backend/.env
          echo 'MAIL_PASSWORD=' >> backend/.env
          echo 'MAIL_ENCRYPTION=' >> backend/.env
          echo 'MAIL_FROM_ADDRESS=test@eyewear.local' >> backend/.env
          echo 'MAIL_FROM_NAME=Eyewear System CI' >> backend/.env
          echo "Created .env file:"
          cat backend/.env

      # 6. Import database schema
      - name: Import database schema
        continue-on-error: true
        run: |
          mysql -h 127.0.0.1 -u root -proot eyewear_system < backend/database/schema.sql && echo "Schema imported OK" || echo "Schema import failed, continuing..."

      # 7. Start PHP built-in server
      - name: Start PHP backend server
        run: |
          php -S 127.0.0.1:8000 -t backend/public &
          echo "Waiting for server to start..."
          sleep 3
          curl -f http://127.0.0.1:8000/api/v1/health || echo "Health check failed, continuing..."

      # 8. Run Postman collection via Newman
      - name: Run Postman API Tests
        run: |
          mkdir -p reports
          newman run "Eyewear-System.postman_collection.json" \
            --env-var "baseUrl=http://127.0.0.1:8000/api/v1" \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export reports/test-report.html \
            --reporter-htmlextra-title "Eyewear System API Test Report" \
            --reporter-json-export reports/test-results.json \
            --timeout-request 10000 \
            --delay-request 500 \
            --bail || true

      # 9. Upload test report as artifact
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: postman-test-report
          path: |
            reports/test-report.html
            reports/test-results.json
          retention-days: 30

      # 10. Comment kết quả lên Pull Request (nếu là PR)
      - name: Comment test results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🧪 Postman API Test Results\n\n';
            try {
              const results = JSON.parse(fs.readFileSync('reports/test-results.json', 'utf8'));
              const stats = results.run.stats;
              const passed = stats.assertions.total - stats.assertions.failed;
              const failed = stats.assertions.failed;
              const emoji = failed === 0 ? '✅' : '❌';
              summary += `${emoji} **${passed}/${stats.assertions.total} tests passed**\n\n`;
              summary += `| Metric | Value |\n|---|---|\n`;
              summary += `| Total Requests | ${stats.requests.total} |\n`;
              summary += `| Passed | ${passed} |\n`;
              summary += `| Failed | ${failed} |\n`;
              if (failed > 0) {
                summary += '\n### ❌ Failed Tests\n';
                results.run.failures.forEach(f => {
                  summary += `- **${f.source.name}**: ${f.error.message}\n`;
                });
              }
            } catch(e) {
              summary += '⚠️ Could not parse test results.\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      # 11. Parse report và cập nhật tất cả Jira tickets liên quan
      - name: Report results to Jira
        if: always()
        env:
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_AUTH: ${{ secrets.JIRA_GMAIL }}:${{ secrets.JIRA_APIKEY }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Đọc kết quả test
          if [ -f reports/test-results.json ]; then
            TOTAL=$(cat reports/test-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['run']['stats']['assertions']['total'])" 2>/dev/null || echo "?")
            FAILED=$(cat reports/test-results.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['run']['stats']['assertions']['failed'])" 2>/dev/null || echo "?")
            PASSED=$(( ${TOTAL:-0} - ${FAILED:-0} ))
            STATUS_EMOJI="✅"
            [ "${FAILED}" != "0" ] && STATUS_EMOJI="❌"
          else
            TOTAL="N/A"; FAILED="N/A"; PASSED="N/A"; STATUS_EMOJI="⚠️"
          fi

          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          post_comment() {
            ISSUE_KEY="$1"
            MSG="$2"
            curl -s -X POST \
              "${JIRA_URL}/rest/api/3/issue/${ISSUE_KEY}/comment" \
              -u "${JIRA_AUTH}" \
              -H "Content-Type: application/json" \
              -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"${MSG}\"}]}]}}" \
              -o /dev/null && echo "✅ Commented on ${ISSUE_KEY}" || echo "⚠️ Failed to comment on ${ISSUE_KEY}"
          }

          # ── ESQ-7: Complete Login API ─────────────────────────────
          post_comment "ESQ-7" \
            "${STATUS_EMOJI} CI Build #${RUN_ID} | Commit ${SHORT_SHA} | Tests: ${PASSED}/${TOTAL} passed, ${FAILED} failed | Report: ${REPORT_URL}"

          # ── ESQ-51: BUG Token Forgery ────────────────────────────
          if [ -f reports/test-results.json ]; then
            TOKEN_BUG=$(cat reports/test-results.json | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          fails=[f['source']['name'] for f in d['run'].get('failures',[]) if 'token' in f['source']['name'].lower() or 'auth' in f['source']['name'].lower()]
          print('FAIL' if fails else 'PASS')
          " 2>/dev/null || echo "UNKNOWN")
            if [ "$TOKEN_BUG" = "FAIL" ]; then
              post_comment "ESQ-51" \
                "❌ CI Build #${RUN_ID} | Token security test FAILED on commit ${SHORT_SHA} — Bug still present. Report: ${REPORT_URL}"
            else
              post_comment "ESQ-51" \
                "✅ CI Build #${RUN_ID} | Token security test passed on commit ${SHORT_SHA}. Report: ${REPORT_URL}"
            fi
          fi

          # ── Tạo Jira ticket mới cho từng test FAIL ────────────────
          if [ -f reports/test-results.json ]; then
            python3 << 'PYEOF'
import json, subprocess, os, sys

with open('reports/test-results.json') as f:
    data = json.load(f)

failures = data['run'].get('failures', [])
if not failures:
    print("No test failures — no new Jira tickets needed.")
    sys.exit(0)

JIRA_URL  = os.environ.get('JIRA_URL', '')
JIRA_AUTH = os.environ.get('JIRA_AUTH', '')
RUN_ID    = os.environ.get('RUN_ID', '')
COMMIT    = os.environ.get('COMMIT_SHA', '')[:7]
REPO      = os.environ.get('GITHUB_REPOSITORY', '')
REPORT_URL = f"https://github.com/{REPO}/actions/runs/{RUN_ID}"

created = 0
for failure in failures:
    name  = failure.get('source', {}).get('name', 'Unknown Test')
    error = failure.get('error', {}).get('message', 'No details')

    summary = f"[CI FAIL] {name} — Build #{RUN_ID}"
    description = (
        f"Test case '{name}' failed in CI pipeline.\n\n"
        f"Commit: {COMMIT}\n"
        f"Error: {error}\n"
        f"Build Report: {REPORT_URL}"
    )

    payload = json.dumps({
        "fields": {
            "project": {"key": "ESQ"},
            "summary": summary,
            "description": {
                "type": "doc", "version": 1,
                "content": [{
                    "type": "paragraph",
                    "content": [{
                        "type": "text",
                        "text": description
                    }]
                }]
            },
            "issuetype": {"name": "Bug"},
            "priority": {"name": "Medium"},
            "labels": ["CI-auto", "postman-test"]
        }
    })

    result = subprocess.run(
        ['curl', '-s', '-o', '/dev/null', '-w', '%{http_code}',
         '-X', 'POST',
         f'{JIRA_URL}/rest/api/3/issue',
         '-u', JIRA_AUTH,
         '-H', 'Content-Type: application/json',
         '-d', payload],
        capture_output=True, text=True
    )
    code = result.stdout.strip()
    if code in ('200', '201'):
        print(f"✅ Created Jira bug for: {name}")
        created += 1
    else:
        print(f"⚠️  Could not create ticket for '{name}' (HTTP {code})")

print(f"Done. Created {created}/{len(failures)} Jira bug tickets.")
PYEOF
          fi

          echo "Jira reporting complete."
