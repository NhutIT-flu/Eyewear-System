name: Eyewear System API Test Automation Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eyewear_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo, pdo_mysql, mbstring, openssl

    - name: Create .env file for CI
      run: |
        echo 'APP_NAME=Eyewear Backend' > backend/.env
        echo 'APP_ENV=testing' >> backend/.env
        echo 'APP_URL=http://127.0.0.1:8000' >> backend/.env
        echo 'APP_DEBUG=true' >> backend/.env
        echo 'API_PREFIX=/api' >> backend/.env
        echo 'JWT_SECRET=ci-test-secret-key-for-github-actions' >> backend/.env
        echo 'JWT_EXPIRE=1440' >> backend/.env
        echo 'DB_CONNECTION=mysql' >> backend/.env
        echo 'DB_HOST=127.0.0.1' >> backend/.env
        echo 'DB_PORT=3306' >> backend/.env
        echo 'DB_DATABASE=eyewear_system' >> backend/.env
        echo 'DB_USERNAME=root' >> backend/.env
        echo 'DB_PASSWORD=root' >> backend/.env

    - name: Import database schema
      continue-on-error: true
      run: |
        mysql -h 127.0.0.1 -u root -proot eyewear_system < backend/database/schema.sql || echo "Schema import failed, continuing..."

    - name: Start PHP backend server
      run: |
        php -S 127.0.0.1:8000 -t backend/public &
        sleep 3
        MAX_RETRIES=5
        RETRY_COUNT=0
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if curl -f http://127.0.0.1:8000/api/v1/health > /dev/null 2>&1; then
            echo "✅ Server is running!"
            break
          fi
          RETRY_COUNT=$((RETRY_COUNT + 1))
          sleep 2
        done

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    - name: Run Eyewear API Tests
      run: |
        newman run "Eyewear-System.postman_collection.json" \
          --env-var "baseUrl=http://127.0.0.1:8000/api/v1" \
          -r cli,htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-eyewear.html \
          --reporter-json-export ./postman-reports/summary-eyewear.json \
          --suppress-exit-code

    # ==========================================================
    # JIRA BUG DEDUPLICATION
    # - Nếu bug cùng API đang mở đã tồn tại: chỉ comment vào bug cũ.
    # - Nếu chưa tồn tại: mới tạo bug.
    # ==========================================================
    - name: Update Jira Bugs Without Duplicates
      if: always()
      env:
        JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_GMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_APIKEY }}
        PROJECT_KEY: 'ESQ'
        ACTOR: ${{ github.actor }}
        BRANCH: ${{ github.ref_name }}
        RUN_ID: ${{ github.run_id }}
        RUN_NUMBER: ${{ github.run_number }}
        REPOSITORY: ${{ github.repository }}
      run: |
        node <<'NODE'
        const fs = require("fs");
        const { execSync } = require("child_process");

        const reportFiles = [
          { name: "Eyewear API", file: "./postman-reports/summary-eyewear.json" }
        ];

        const requiredEnv = ["JIRA_BASE_URL", "JIRA_USER_EMAIL", "JIRA_API_TOKEN", "PROJECT_KEY"];
        for (const key of requiredEnv) {
          if (!process.env[key]) {
            console.log(`⚠️ Missing env ${key}. Skip Jira update.`);
            process.exit(0);
          }
        }

        const auth = Buffer
          .from(`${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`)
          .toString("base64");

        const jiraBase = process.env.JIRA_BASE_URL.replace(/\/$/, "");

        const members = [
          "712020:ba3687e1-2a5e-4f18-8594-07315b414728",
          "712020:b2b9ed8a-a72a-43ae-8a12-1c5c7e599e08",
          "712020:0ad5e210-883e-4449-8daa-2d3b51029e4d",
          "712020:d335bfed-2162-4164-9e7f-172d5434d5b0",
          "712020:83ddbb5b-a878-423a-8972-12137f84b4f3"
        ];

        function curlJson(method, url, body = null) {
          const bodyPart = body ? `-d @-` : "";
          const cmd =
            `curl -s -X ${method} ` +
            `-H "Authorization: Basic ${auth}" ` +
            `-H "Content-Type: application/json" ` +
            `${bodyPart} "${url}"`;

          const output = execSync(cmd, {
            input: body ? JSON.stringify(body) : undefined,
            encoding: "utf8",
            maxBuffer: 1024 * 1024 * 20
          });

          if (!output || output.trim() === "") return {};
          try {
            return JSON.parse(output);
          } catch (e) {
            console.log("⚠️ Jira response is not JSON:", output.slice(0, 500));
            return {};
          }
        }

        function normalizeText(value) {
          return String(value || "")
            .replace(/[\r\n\t]+/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        }

        function escapeJql(value) {
          return String(value || "")
            .replace(/\\/g, "\\\\")
            .replace(/"/g, '\\"');
        }

        function slugify(value) {
          return normalizeText(value)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "")
            .slice(0, 60);
        }

        const failures = [];
        const uniqueErrors = new Set();

        for (const item of reportFiles) {
          if (!fs.existsSync(item.file)) continue;

          const data = JSON.parse(fs.readFileSync(item.file, "utf8"));
          const runFailures = data?.run?.failures || [];

          for (const fail of runFailures) {
            const apiName = normalizeText(fail?.source?.name || "Unknown API");
            const errorMsg = normalizeText(fail?.error?.message || "Assertion failed");

            // Chống trùng trong cùng 1 lần chạy.
            const errorKey = `${item.name}|||${apiName}|||${errorMsg}`;
            if (uniqueErrors.has(errorKey)) continue;
            uniqueErrors.add(errorKey);

            const bugKey = slugify(`${item.name}-${apiName}`);

            failures.push({
              moduleName: item.name,
              apiName,
              errorMsg,
              bugKey,
              summary: `❌ [CI/CD] Lỗi API: ${apiName} (${item.name})`
            });
          }
        }

        if (failures.length === 0) {
          console.log("✅ Không có lỗi Newman nào cần cập nhật Jira.");
          process.exit(0);
        }

        const runUrl = `https://github.com/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`;
        let createdCount = 0;
        let commentedCount = 0;

        // Lấy danh sách bug CI/CD đang mở trước, sau đó so sánh bằng JS.
        // Cách này tránh lỗi JQL khi summary có emoji, ngoặc [], dấu (), tiếng Việt.
        function getOpenCiBugs() {
          const jql =
            `project = ${process.env.PROJECT_KEY} ` +
            `AND issuetype = Bug ` +
            `AND statusCategory != Done ` +
            `AND labels in ("ci-cd", "auto-detected")`;

          const url =
            `${jiraBase}/rest/api/2/search` +
            `?jql=${encodeURIComponent(jql)}` +
            `&maxResults=1000` +
            `&fields=summary,status,labels`;

          const res = curlJson("GET", url);
          return res.issues || [];
        }

        const openCiBugs = getOpenCiBugs();
        console.log(`🔎 Found ${openCiBugs.length} open CI/CD bugs in Jira.`);

        function findExistingBug(bug) {
          const targetSummary = normalizeText(bug.summary);
          const targetApi = normalizeText(bug.apiName);
          const targetModule = normalizeText(bug.moduleName);
          const targetBugKey = bug.bugKey;

          return openCiBugs.find(issue => {
            const summary = normalizeText(issue?.fields?.summary || "");
            const labels = issue?.fields?.labels || [];

            // Ưu tiên bắt bằng label ổn định.
            if (labels.includes(`api-${targetBugKey}`)) return true;

            // Bắt bug cũ đã tạo trước đó bằng exact summary.
            if (summary === targetSummary) return true;

            // Bắt bug cũ không có emoji hoặc khác nhẹ prefix.
            if (
              summary.includes("[CI/CD]") &&
              summary.includes(targetApi) &&
              summary.includes(targetModule)
            ) {
              return true;
            }

            return false;
          }) || null;
        }

        function commentExistingBug(issueKey, bug) {
          const comment =
            `CI/CD vẫn phát hiện lỗi này trong lần chạy mới.\n\n` +
            `* API: ${bug.apiName}\n` +
            `* Bộ test: ${bug.moduleName}\n` +
            `* Lỗi: ${bug.errorMsg}\n` +
            `* Người chạy: ${process.env.ACTOR}\n` +
            `* Branch: ${process.env.BRANCH}\n` +
            `* GitHub Actions Run #${process.env.RUN_NUMBER}: ${runUrl}\n` +
            `* Report HTML: xem trong Artifacts của GitHub Actions.`;

          curlJson("POST", `${jiraBase}/rest/api/2/issue/${issueKey}/comment`, { body: comment });
          console.log(`💬 Bug đã tồn tại (${issueKey}) cho [${bug.apiName}], đã comment vào bug cũ.`);
          commentedCount++;
        }

        function createNewBug(bug, index) {
          const assigneeId = members.length > 0 ? members[index % members.length] : null;

          const description =
            `Hệ thống kiểm thử tự động phát hiện API bị lỗi.\n\n` +
            `* Bộ kịch bản: ${bug.moduleName}\n` +
            `* Tên API: ${bug.apiName}\n` +
            `* Chi tiết lỗi: ${bug.errorMsg}\n\n` +
            `---\n` +
            `* Người kích hoạt build: ${process.env.ACTOR}\n` +
            `* Nhánh code: ${process.env.BRANCH}\n` +
            `* GitHub Actions Run #${process.env.RUN_NUMBER}: ${runUrl}\n` +
            `* Báo cáo HTML: tải trong mục Artifacts trên GitHub Actions.`;

          const jiraData = {
            fields: {
              project: { key: process.env.PROJECT_KEY },
              summary: bug.summary,
              description,
              issuetype: { name: "Bug" },
              priority: { name: "High" },
              labels: [
                "ci-cd",
                "postman",
                "auto-detected",
                `api-${bug.bugKey}`
              ]
            }
          };

          if (assigneeId) {
            jiraData.fields.assignee = { accountId: assigneeId };
          }

          const res = curlJson("POST", `${jiraBase}/rest/api/2/issue`, jiraData);
          if (res.key) {
            console.log(`✅ Đã tạo Bug mới [${bug.apiName}] (${res.key})`);
            createdCount++;
          } else {
            console.log(`❌ Không tạo được bug cho [${bug.apiName}]. Jira response:`, JSON.stringify(res).slice(0, 1000));
          }
        }

        for (const [index, bug] of failures.entries()) {
          const existingBug = findExistingBug(bug);
          if (existingBug) {
            commentExistingBug(existingBug.key, bug);
          } else {
            createNewBug(bug, index);
          }
        }

        console.log(`\n📌 Jira update done. Created: ${createdCount}, Commented existing: ${commentedCount}`);
        NODE

    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/
