name: Eyewear System API Test Automation Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-verification:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eyewear_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo, pdo_mysql, mbstring, openssl, pcov, xdebug
        coverage: pcov

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: backend/vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Dependencies (Composer)
      run: |
        cd backend
        composer install --no-interaction --prefer-dist --optimize-autoloader

    - name: Create .env file for CI
      run: |
        echo 'APP_NAME=Eyewear Backend' > backend/.env
        echo 'APP_ENV=testing' >> backend/.env
        echo 'APP_URL=http://127.0.0.1:8000' >> backend/.env
        echo 'APP_DEBUG=true' >> backend/.env
        echo 'API_PREFIX=/api' >> backend/.env
        echo 'JWT_SECRET=ci-test-secret-key-for-github-actions' >> backend/.env
        echo 'JWT_EXPIRE=1440' >> backend/.env
        echo 'DB_CONNECTION=mysql' >> backend/.env
        echo 'DB_HOST=127.0.0.1' >> backend/.env
        echo 'DB_PORT=3306' >> backend/.env
        echo 'DB_DATABASE=eyewear_system' >> backend/.env
        echo 'DB_USERNAME=root' >> backend/.env
        echo 'DB_PASSWORD=root' >> backend/.env

    - name: Security Scan (Composer Audit)
      run: |
        cd backend
        composer audit --format=json > security-check.json || true
        echo "✅ Security scan completed."

    - name: Import database schema and run seeder
      run: |
        if [ ! -f backend/database/schema.sql ]; then
          echo "❌ schema.sql not found! Aborting to prevent cascade test failures."
          exit 1
        fi
        mysql -h 127.0.0.1 -u root -proot eyewear_system < backend/database/schema.sql
        echo "✅ Database schema imported successfully."
        
        php backend/database/seeder.php
        echo "✅ Database seeded successfully."

    - name: Start PHP backend server
      run: |
        php -S 127.0.0.1:8000 -t backend/public backend/public/index.php > /tmp/php-server.log 2>&1 &
        echo "⏳ Waiting for server to be ready..."
        MAX_RETRIES=15
        RETRY_COUNT=0
        SERVER_READY=false
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/health 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Server is responding (HTTP $HTTP_CODE)."
            SERVER_READY=true
            break
          fi
          RETRY_COUNT=$((RETRY_COUNT + 1))
          echo "   Attempt $RETRY_COUNT/$MAX_RETRIES — waiting 2s..."
          sleep 2
        done
        if [ "$SERVER_READY" != "true" ]; then
          echo "❌ Server failed to start after $MAX_RETRIES attempts. PHP log:"
          cat /tmp/php-server.log
          exit 1
        fi

    - name: Run PHPUnit Tests & Coverage
      run: |
        cd backend
        if [ -f vendor/bin/phpunit ]; then
          mkdir -p ../phpunit-reports
          vendor/bin/phpunit --coverage-html ../phpunit-coverage --testdox-html ../phpunit-reports/bva-ep-report.html || true
          echo "✅ PHPUnit tests completed."
        else
          echo "⚠️ PHPUnit not found. Skipping whitebox tests."
        fi

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    - name: Run Eyewear API Tests
      timeout-minutes: 10
      run: |
        echo "🔄 Resetting database for Newman tests..."
        mysql -h 127.0.0.1 -u root -proot eyewear_system < backend/database/schema.sql
        php backend/database/seeder.php
        
        newman run "Eyewear-System.postman_collection.json" \
          -e "Eyewear-Local-Environment.postman_environment.json" \
          --env-var "baseUrl=http://127.0.0.1:8000/api/v1" \
          --timeout-request 10000 \
          --timeout 120000 \
          -r cli,htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-eyewear.html \
          --reporter-json-export ./postman-reports/summary-eyewear.json \
          --suppress-exit-code

    - name: Sync Jira Bugs With Test Results
      if: success() || failure()
      env:
        JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_GMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_APIKEY }}
        PROJECT_KEY: 'ESQ'
        ACTOR: ${{ github.actor }}
        BRANCH: ${{ github.ref_name }}
        RUN_ID: ${{ github.run_id }}
        RUN_NUMBER: ${{ github.run_number }}
        REPOSITORY: ${{ github.repository }}
      run: node .github/scripts/jira-sync.js

    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: Complete-Test-Reports
        path: |
          postman-reports/
          phpunit-coverage/
          phpunit-reports/
          backend/security-check.json
          /tmp/php-server.log

    - name: Send Discord Notification
      if: success() || failure()
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        REPO_NAME: ${{ github.repository }}
        BRANCH_NAME: ${{ github.ref_name }}
        JOB_STATUS: ${{ job.status }}
        RUN_ID: ${{ github.run_id }}
      run: |
        PAYLOAD=$(jq -n \
          --arg content "🚀 CI/CD Pipeline Finished!
        Repository: $REPO_NAME
        Branch: $BRANCH_NAME
        Status: $JOB_STATUS
        URL: https://github.com/$REPO_NAME/actions/runs/$RUN_ID" \
          '{content: $content}')
        
        curl -s -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
