name: Eyewear System API Test Automation Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  api-verification:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eyewear_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # =======================================================================
    # BƯỚC 1: KHỞI TẠO MÔI TRƯỜNG PHP & MYSQL CHO BACKEND
    # =======================================================================
    - name: Setup PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo, pdo_mysql, mbstring, openssl

    - name: Create .env file for CI
      run: |
        echo 'APP_NAME=Eyewear Backend' > backend/.env
        echo 'APP_ENV=testing' >> backend/.env
        echo 'APP_URL=http://127.0.0.1:8000' >> backend/.env
        echo 'APP_DEBUG=true' >> backend/.env
        echo 'API_PREFIX=/api' >> backend/.env
        echo 'JWT_SECRET=ci-test-secret-key-for-github-actions' >> backend/.env
        echo 'JWT_EXPIRE=1440' >> backend/.env
        echo 'DB_CONNECTION=mysql' >> backend/.env
        echo 'DB_HOST=127.0.0.1' >> backend/.env
        echo 'DB_PORT=3306' >> backend/.env
        echo 'DB_DATABASE=eyewear_system' >> backend/.env
        echo 'DB_USERNAME=root' >> backend/.env
        echo 'DB_PASSWORD=root' >> backend/.env

    - name: Import database schema
      continue-on-error: true
      run: |
        mysql -h 127.0.0.1 -u root -proot eyewear_system < backend/database/schema.sql || echo "Schema import failed, continuing..."

    - name: Start PHP backend server
      run: |
        php -S 127.0.0.1:8000 -t backend/public &
        sleep 3
        MAX_RETRIES=5
        RETRY_COUNT=0
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          if curl -f http://127.0.0.1:8000/api/v1/health > /dev/null 2>&1; then
            echo "✅ Server is running!"
            break
          fi
          RETRY_COUNT=$((RETRY_COUNT + 1))
          sleep 2
        done

    # =======================================================================
    # BƯỚC 2: KHỞI TẠO NODE.JS ĐỂ PHỤC VỤ CHẠY NEWMAN API TEST
    # =======================================================================
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Newman and HTML Extra Reporter
      run: |
        npm install -g newman
        npm install -g newman-reporter-htmlextra

    - name: Create Reports Directory
      run: mkdir -p postman-reports

    # =======================================================================
    # BƯỚC 3: KÍCH HOẠT QUÉT NEWMAN QUA FILE POSTMAN COLLECTION
    # =======================================================================
    - name: Run Eyewear API Tests
      run: |
        newman run "Eyewear-System.postman_collection.json" \
          --env-var "baseUrl=http://127.0.0.1:8000/api/v1" \
          -r cli,htmlextra,json \
          --reporter-htmlextra-export ./postman-reports/report-eyewear.html \
          --reporter-json-export ./postman-reports/summary-eyewear.json \
          --suppress-exit-code

    # =======================================================================
    # BƯỚC 4: SCRIPT LỌC LỖI KHI BẮN SANG JIRA
    # =======================================================================
    - name: Parse Failures and Assign Jira Bugs
      env:
        JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_GMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_APIKEY }}
        PROJECT_KEY: 'ESQ'
        ACTOR: ${{ github.actor }}
        BRANCH: ${{ github.ref_name }}
      run: |
        node -e '
        const fs = require("fs");
        const { execSync } = require("child_process");
        
        const files = [
          { name: "Eyewear API", file: "./postman-reports/summary-eyewear.json" }
        ];
        
        const auth = Buffer.from(`${process.env.JIRA_USER_EMAIL}:${process.env.JIRA_API_TOKEN}`).toString("base64");
        
        // CHÚ Ý: Điền ID của các thành viên trong nhóm Jira vào mảng này
        // Bạn có thể lấy Account ID của từng người bằng cách vào Jira -> Chọn 1 ticket bất kỳ -> Nhấp vào Assignee -> Nhìn vào URL hoặc gọi API.
        const members = [
          "712020:ba3687e1-2a5e-4f18-8594-07315b414728",
          "712020:b2b9ed8a-a72a-43ae-8a12-1c5c7e599e08",
          "712020:0ad5e210-883e-4449-8daa-2d3b51029e4d",
          "712020:d335bfed-2162-4164-9e7f-172d5434d5b0",
          // "712020:9645f74c-0db2-4301-a77a-f0f57c6244fd",
          "712020:83ddbb5b-a878-423a-8972-12137f84b4f3"
        ];
        
        let totalBugCount = 0;
        const uniqueErrors = new Set();
        const failuresToProcess = [];
        
        // Quét lọc lỗi duy nhất tránh rác bảng Jira
        files.forEach(item => {
          if (fs.existsSync(item.file)) {
            const data = JSON.parse(fs.readFileSync(item.file, "utf8"));
            if (data.run && data.run.failures && data.run.failures.length > 0) {
              data.run.failures.forEach((fail) => {
                const apiName = fail.source ? fail.source.name : "Không rõ API";
                let assertionError = fail.error ? fail.error.message : "Lỗi Assert";
                
                assertionError = assertionError.replace(/[\r\n\"]+/g, " ");
                const errorKey = `${item.name}|||${apiName}|||${assertionError}`;
                
                if (!uniqueErrors.has(errorKey)) {
                  uniqueErrors.add(errorKey);
                  failuresToProcess.push({
                    moduleName: item.name,
                    apiName: apiName,
                    errorMsg: assertionError
                  });
                }
              });
            }
          }
        });
        
        if (failuresToProcess.length === 0) {
          console.log("✅ Không có lỗi nào cần tạo ticket.");
          process.exit(0);
        }

        // Tiến hành bắn lệnh tạo thẻ đơn lẻ
        failuresToProcess.forEach((bug) => {
          
          let assigneeObj = undefined;
          if (members && members.length > 0) {
            const assigneeId = members[totalBugCount % members.length];
            assigneeObj = { accountId: assigneeId };
            totalBugCount++;
          }
          
          const summary = `❌ [CI/CD] Lỗi API: ${bug.apiName} (${bug.moduleName})`;
          const description = `Hệ thống kiểm thử tự động phát hiện ca assert này bị gãy:\n\n` +
                              `* Bộ kịch bản: ${bug.moduleName}\n` +
                              `* Tên API: ${bug.apiName}\n` +
                              `* Chi tiết lỗi: {color:red}${bug.errorMsg}{color}\n\n` +
                              `---\n` +
                              `* Người kích hoạt build: ${process.env.ACTOR}\n` +
                              `* Nhánh code: ${process.env.BRANCH}\n` +
                              `* Chi tiết đồ thị: Tải file báo cáo HTML trong mục Artifacts trên GitHub.`;
          
          const jiraData = {
            fields: {
              project: { key: process.env.PROJECT_KEY },
              summary: summary,
              description: description,
              issuetype: { name: "Bug" },
              priority: { name: "High" }
            }
          };
          
          if (assigneeObj) {
            jiraData.fields.assignee = assigneeObj;
          }
          
          try {
            const curlCommand = `curl -s -X POST -H "Authorization: Basic ${auth}" ` +
                                `-H "Content-Type: application/json" ` +
                                `-d @- "${process.env.JIRA_BASE_URL}/rest/api/2/issue"`;
            
            const response = execSync(curlCommand, { input: JSON.stringify(jiraData), encoding: "utf8" });
            const resJson = JSON.parse(response);
            console.log(`✅ Đã tạo Bug [${bug.apiName}] (${resJson.key})`);
          } catch (error) {
            console.error(`❌ Lỗi tạo thẻ cho API [${bug.apiName}]:`, error.message);
          }
        });
        '

    # ==========================================
    # ĐẨY BÁO CÁO LÊN ARTIFACTS
    # ==========================================
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Complete-Postman-Test-Reports
        path: postman-reports/
