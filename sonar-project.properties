# ─────────────────────────────────────────────────────────────
# Eyewear System — SonarQube Configuration
# ─────────────────────────────────────────────────────────────
sonar.projectKey=eyewear-system
sonar.projectName=Eyewear System
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ── Source directories to analyze ──────────────────────────────
sonar.sources=backend/app,backend/core,backend/routes,frontend/js

# ── Language-specific settings ─────────────────────────────────
sonar.php.file.suffixes=php

# ── Exclusions: skip vendor, libs, minified, images, tests ─────
sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/*.min.js,\
  **/*.min.css,\
  backend/PHPMailer/**,\
  backend/scratch/**,\
  backend/tests/**,\
  frontend/assets/images/**

# ── Coverage: excluded entirely (no PHPUnit — using Postman) ───
sonar.coverage.exclusions=**/*

# ── Duplication: exclude frontend assets & generated files ─────
sonar.cpd.exclusions=\
  frontend/assets/**,\
  **/*.min.js,\
  **/*.min.css
